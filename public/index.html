<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Smart</title>
  <!-- Face API -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    :root {
      --primary: #3498db;
      --success: #27ae60;
      --danger:  #e74c3c;
      --warning: #f1c40f;
      --bg:      #f5f6fa;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }

    /* ===== LOGIN ===== */
    #auth-page {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      overflow-y: auto;
    }
    .auth-card {
      background: white; padding: 28px; border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center;
      margin: 20px auto;
    }
    input {
      width: 100%; padding: 11px 12px; margin: 6px 0;
      border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
    }

    /* Kamera signup */
    .signup-camera {
      width: 150px; height: 150px; margin: 12px auto;
      border-radius: 50%; overflow: hidden; background: #222;
      border: 3px solid var(--primary);
    }
    .signup-camera video { width: 100%; height: 100%; object-fit: cover; }

    #faceStatus {
      font-size: 12px; color: #888; margin: 6px 0 4px;
    }

    /* ===== PAGES ===== */
    .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    .active { display: block; }
    .card {
      background: white; padding: 20px; border-radius: 15px;
      max-width: 350px; margin: 20px auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
    }

    /* ===== KAMERA HOME ===== */
    .camera-section {
      width: 180px; height: 180px; margin: 15px auto;
      border-radius: 50%; overflow: hidden; background: #000;
      border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    video { width: 100%; height: 100%; object-fit: cover; }

    /* ===== STATUS ===== */
    .status-badge {
      display: inline-block; padding: 6px 18px;
      border-radius: 20px; font-weight: 600; font-size: 14px;
      background: #eee; color: #555; margin-bottom: 8px;
    }

    /* ===== TOMBOL ===== */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
    button:active { transform: scale(0.97); }
    .btn-full { grid-column: span 2; width: 100%; }
    .in      { background: var(--success); color: white; }
    .out     { background: var(--danger);  color: white; }
    .primary { background: var(--primary); color: white; }
    .hidden  { display: none !important; }

    /* ===== SETTING ===== */
    .setting-item { text-align: left; margin: 10px 0; }
    .setting-item label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .setting-item input { margin: 0; }

    /* ===== NAV ===== */
    .bottom-nav {
      position: fixed; bottom: 0; width: 100%; background: white;
      display: flex; border-top: 1px solid #eee; padding: 10px 0;
    }
    .nav-item {
      flex: 1; background: none; color: #999; font-size: 11px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: none; cursor: pointer; padding: 4px;
    }
    .nav-item.active-tab { color: var(--primary); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- ===== HALAMAN LOGIN / SIGN UP ===== -->
  <div id="auth-page">
    <div class="auth-card">
      <h2 id="auth-title">Login</h2>

      <!-- Kamera untuk Sign Up (scan wajah) -->
      <div id="face-signup-section" class="hidden">
        <p style="font-size:13px; color:#555; margin:0 0 6px;">Hadapkan wajah ke kamera</p>
        <div class="signup-camera">
          <video id="video-signup" autoplay playsinline muted></video>
        </div>
        <div id="faceStatus">⏳ Memuat model wajah...</div>
      </div>

      <input type="text"     id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">

      <button class="btn-full primary" onclick="handleAuth()" id="btn-auth-main"
        style="margin-top:10px;">Login</button>

      <p style="font-size:12px; color:#666; margin-top:12px;" id="auth-toggle-text">
        Belum punya akun? <a href="#" onclick="toggleAuthMode()">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- ===== HALAMAN HOME ===== -->
  <div id="home" class="page">
    <div class="card">
      <div id="statusText" class="status-badge">Memuat...</div>
      <div class="camera-section">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
      </div>
      <div class="btn-group">
        <button id="btn-in"          class="in  btn-full" onclick="clockIn()">Clock In</button>
        <button id="btn-break-start" class="primary hidden" onclick="breakStart()">Istirahat</button>
        <button id="btn-break-end"   class="in  hidden" onclick="breakEnd()">Selesai Istirahat</button>
        <button id="btn-out"         class="out hidden" onclick="clockOut()">Clock Out</button>
      </div>
    </div>
  </div>

  <!-- ===== HALAMAN SETTING ===== -->
  <div id="setting" class="page">
    <div class="card">
      <h3>Pengaturan Area Kantor</h3>
      <div class="setting-item">
        <label>Latitude</label>
        <input type="number" id="setLat" placeholder="-6.2000000" step="0.0000001">
      </div>
      <div class="setting-item">
        <label>Longitude</label>
        <input type="number" id="setLng" placeholder="106.8000000" step="0.0000001">
      </div>
      <div class="setting-item">
        <label>Radius (meter)</label>
        <input type="number" id="setRadius" placeholder="100">
      </div>
      <div class="btn-group" style="margin-top:12px;">
        <button class="primary" onclick="getMyLocation()">📍 Lokasi Saya</button>
        <button class="in"      onclick="saveSetting()">💾 Simpan</button>
      </div>
      <button class="btn-full out" style="margin-top:20px;" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav id="main-nav" class="bottom-nav hidden">
    <button onclick="showPage('home')"    class="nav-item active-tab" id="tab-home">🏠<span>Beranda</span></button>
    <button onclick="showPage('setting')" class="nav-item"            id="tab-setting">⚙️<span>Seting</span></button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
